version: "3.9"

services:

  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${DBUSER}
      POSTGRES_PASSWORD: ${DBPASS}
      POSTGRES_DB: ${DBNAME}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./src/creation.sql:/docker-entrypoint-initdb.d/creation.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DBUSER} -d ${DBNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - postgres-net
    ports:
      - "5432:5432"

  web-app:
    build: .
    env_file:
      - .env
    volumes:
      - ./src:/app
    ports:
      - "8080:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - postgres-net
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--reload", "app:f_app"]

volumes:
  postgres-data:

networks:
  postgres-net: